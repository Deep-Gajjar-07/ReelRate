{% extends "base.html" %}

{% block title %}Edit Review{% endblock %}


{% block content %}

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4 shadow-sm">
                    <h5>Edit Review</h5>
                    <p class="lead">For {{ review.movie.title }}</p>
                    <hr class="mb-3 mt-0">

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label text-muted">Rating</label>
                            <select name="rating" class="form-select">
                            {% for i in "12345" %}
                                <option value="{{ forloop.counter }}"
                                {% if forloop.counter == review.rating %}selected{% endif %}>
                                    {{ forloop.counter }} Star{% if forloop.counter > 1 %}s{% endif %}
                                </option>
                            {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-muted">Review</label>
                            <textarea name="review" class="form-control" rows="4">{{ review.review }}</textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Save changes</button>
                            <a href="{% url 'user_review_page' %}" class="btn btn-outline-secondary">Cancel</a>
                        </div>

                    </form>

                </div>
            </div>
        </div>
    </div>

{% endblock %}
