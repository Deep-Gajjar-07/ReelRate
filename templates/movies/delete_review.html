{% extends "base.html" %}

{% block title %}Edit Review{% endblock %}


{% block content %}

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4 shadow-sm">
                    <h5 class="mb-4">Delete Review!</h5>
                
                    <p class="text-muted">Are you sure want to delete review for movie
                        <strong>"{{ review.movie.title }}"</strong>?
                    </p>

                    <form method="post" class="d-flex gap-2 mt-3 justify-content-end">
                        {% csrf_token %}
                        <a href="{% url "user_review_page" %}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    </form>

                </div>
            </div>
        </div>
    </div>

{% endblock %}
