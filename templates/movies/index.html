{% extends "base.html" %}

{% block title %}Home Page{% endblock %}

{% block content %}

    {% comment %} showing all available movies from DB in cards {% endcomment %}
    <div class="row row-cols-md-5 row-cols-sm-2 row-cols-lg-5 gap-2">
        {% for movie in movies %}
            <div class="col">
                <a href="{% url "movie_detail" movie.id %}" style="text-decoration: none;">
                    <div class="card h-100" style="width: 18rem;">
                        <img src="{{ movie.poster.url }}" class="card-img-top" alt="{{ movie.title }}" style="height: 15rem;">
                        <div class="card-body">
                            <h5 class="card-title">{{ movie.title }}</h5>
                            <span class="badge text-white px-4 py-2 text-wrap mt-2" style="background-color: violet; border-radius: 5px;">{{ movie.genre }}</span>
                        </div>
                    </div>
                </a>
            </div>
        {% endfor %}
    </div>

{% endblock %}
