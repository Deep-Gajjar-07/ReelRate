{% extends "base.html" %}

{% block title %}Home Page{% endblock %}

{% block content %}

    {% comment %} showing all available movies from DB in cards {% endcomment %}
    <div class="row m-4 d-flex row-cols-md-4 row-cols-sm-2 row-cols-lg-5 gap-4 justify-content-center">
        {% for movie in movies %}
            <div class="col mb-3">
                <a href="{% url "movie_detail" movie.id %}" style="text-decoration: none;">
                    <div class="card h-100" style="width: 15rem;">
                        <img src="{{ movie.poster.url }}" class="card-img-top" alt="{{ movie.title }}" style="height: 15rem;">
                        <div class="card-body">
                                <h5 class="card-title">{{ movie.title }}</h5>
                                <span class="mt-3 badge px-4 py-2" style="background-color: #7d7d7d;">
                                {{ movie.genre }}</span>
                        </div>
                    </div>
                </a>
            </div>
        {% endfor %}
    </div>

{% endblock %}
