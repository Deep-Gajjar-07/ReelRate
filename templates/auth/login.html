{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card p-4 shadow-sm">
                <h4 class="fw-medium mb-4">Welcome back!</h4>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="username" class="form-label small text-muted">Username:</label>
                        <input type="text" name="username" class="form-control" placeholder="Your username" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label small text-muted">Password:</label>
                        <input type="password" name="password" class="form-control" placeholder="Your Password" required>
                    </div>

                    {% if errors %}
                        <div class="alert alert-danger py-2">
                            {{ errors }}
                        </div>
                    {% endif %}

                    <button type="submit" class="btn btn-success w-100 mt-3">Login</button>

                </form>

                <p class="text-center small text-muted mt-4 mb-0">Don't have an account?
                    <a href="{% url "register_page" %}">Sign Up.</a>
                </p>

            </div>
        </div>
    </div>
</div>
{% endblock %}
