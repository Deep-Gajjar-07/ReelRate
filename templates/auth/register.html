{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card p-4 shadow-sm">
                <h4 class="fw-medium mb-1">Welcome!</h4>
                <p class="text-muted medium mb-3 mt-0">Create an account</p>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="username" class="form-label small text-muted">Username:</label>
                        <input type="text" name="username" class="form-control" placeholder="Your username" required>
                    </div>

                     <div class="mb-3">
                        <label class="form-label small text-muted">Email</label>
                        <input type="email" name="email" class="form-control"
                            placeholder="Your Email..." required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label small text-muted">Password:</label>
                        <input type="password" name="password1" class="form-control" placeholder="Your Password" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label small text-muted">Confirm Password:</label>
                        <input type="password" name="password2" class="form-control" placeholder="Confirm Your Password" required>
                    </div>

                    {% if error %}
                    <div class="alert alert-danger py-2">
                        {{ error }}
                    </div>
                    {% endif %}
                    
                    <button type="submit" class="btn btn-primary w-100 mt-3">Sign Up</button>

                </form>

                <p class="text-center small text-muted mt-4 mb-0">Already have an account?
                    <a href="{% url "login_page" %}">Login.</a>
                </p>

            </div>
        </div>
    </div>
</div>
{% endblock %}
